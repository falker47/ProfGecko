# Ruff linter configuration
target-version = "py312"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # bugbear
    "SIM",  # simplify
]
ignore = [
    "E501",   # line too long — handled by formatter
    "B008",   # do not perform function calls in argument defaults (FastAPI Depends)
    "UP007",  # use X | Y for union types — already used where appropriate
]

[lint.per-file-ignores]
"app/core/cache_normalization.py" = ["E501"]  # data dictionaries have long lines
"app/ingestion/*.py" = ["SIM108", "B007"]     # one-off scripts, style nits acceptable
